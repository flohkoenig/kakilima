name: deploy

# Baut den Rezept-Index frisch und veröffentlicht die Seite auf GitHub Pages.
# Läuft bei jeder Änderung an main – egal ob Rezept (Markdown), Bild oder
# Seitencode. Der Index wird dabei in der CI erzeugt, nicht ins Repo
# zurückgeschrieben (kein Commit-Loop).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rezept-Index bauen
        run: node scripts/build-index.mjs

      - name: Build prüfen
        run: |
          test -f recipes/index.json
          echo "Rezepte im Index: $(node -e "console.log(require('./recipes/index.json').length)")"

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
