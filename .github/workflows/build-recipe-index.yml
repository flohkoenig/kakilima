name: build-recipe-index

# Erzeugt recipes/index.json automatisch, sobald sich Rezepte ändern,
# und veröffentlicht die Seite anschließend über GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - "recipes/**.md"
      - "scripts/build-index.mjs"
      - ".github/workflows/build-recipe-index.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rezept-Index bauen
        run: node scripts/build-index.mjs

      - name: index.json committen (falls geändert)
        run: |
          if [ -n "$(git status --porcelain recipes/index.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add recipes/index.json
            git commit -m "chore: Rezept-Index automatisch aktualisiert"
            git push
          else
            echo "Keine Änderungen am Index."
          fi

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
